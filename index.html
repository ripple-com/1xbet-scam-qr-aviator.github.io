<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-SIGNAL | Universal Access</title>
    <script src="https://openfpcdn.io/fingerprintjs/v4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Styles පෙර පරිදිම පවතී --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body {
            background-color: #060608; color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a24 0%, #060608 70%);
        }
        .premium-container {
            background: rgba(16, 16, 20, 0.95); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px; width: 100%; max-width: 520px; padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
        }
        .header { text-align: center; margin-bottom: 35px; }
        .brand-logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .brand-logo span { color: #ff0040; text-shadow: 0 0 15px rgba(255, 0, 64, 0.5); }
        .sub-header { font-size: 11px; color: #9090a0; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        
        #loginSection, #deviceVerifySection, #mainAppSection { display: none; }
        #loginSection { display: block; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; }
        .input-group input { 
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; 
            color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #ff0040; }
        .error-msg { color: #ff4d79; font-size: 12px; margin-bottom: 15px; display: none; text-align: center; border: 1px solid #ff4d7930; padding: 10px; border-radius: 8px; background: #ff4d7910; }

        .action-btn {
            background: linear-gradient(135deg, #ff0040, #ff4d79);
            color: white; border: none; padding: 18px; border-radius: 15px; 
            width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        .device-box {
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px;
            text-align: center; margin-bottom: 20px; border: 1px solid rgba(255, 0, 64, 0.2);
        }
        .device-id-text {
            font-family: 'Space Mono', monospace; font-size: 16px;
            color: #ff0040; display: block; margin: 10px 0; word-break: break-all;
        }
        .status-loader { font-size: 13px; color: #00f2ff; margin-bottom: 10px; display: block; }

        /* App Logic Styles */
        #outputWrapper { display: none; margin-top: 30px; }
        .result-card { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .signal-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .time-range { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: #fff; display: block; }
        .purple-text { color: #a333ff; }
        .pink-text { color: #ff0040; }
        #hidden-copy-area { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div class="premium-container">
        <div class="header">
            <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
            <div class="sub-header" id="dynamicSub">Secure Multi-Browser Access</div>
        </div>

        <div id="loginSection">
            <div class="input-group">
                <label>Registered Email</label>
                <input type="email" id="userEmail" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="userPass" placeholder="••••••••">
            </div>
            <div id="loginError" class="error-msg"></div>
            <button class="action-btn" id="loginBtn" onclick="handleLogin()">LOGIN TO SYSTEM</button>
        </div>

        <div id="deviceVerifySection" style="text-align: center;">
            <div class="device-box">
                <p style="font-size: 12px; color: #888;">YOUR HARDWARE ID:</p>
                <span id="displayDevID" class="device-id-text">GENERATING...</span>
                <button onclick="copyDeviceID()" style="background: none; border: 1px solid #444; color: #aaa; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px;">COPY ID</button>
            </div>
            <span class="status-loader">⌛ Waiting for Admin Activation...</span>
            <p style="font-size: 11px; color: #555;">This ID remains same on any browser of this device.</p>
        </div>

        <div id="mainAppSection">
            <input type="file" id="imageInput" style="display:none;" accept="image/*">
            <label for="imageInput" style="display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed rgba(255, 0, 64, 0.3); border-radius: 20px; padding: 30px; cursor: pointer; background: rgba(255, 255, 255, 0.02); color: #888; margin-bottom: 15px;">
                <span id="labelText">Upload History Screenshot</span>
            </label>
            <button class="action-btn" id="analyzeBtn" onclick="processImage()">Generate Signals</button>

            <div id="outputWrapper">
                <div class="result-card" id="outputContent"></div>
                <button class="action-btn" id="copyBtn" onclick="copyToClipboard()" style="margin-top: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">Copy Signals Text</button>
            </div>
        </div>

        <textarea id="hidden-copy-area"></textarea>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBmLvGb0vXkJhKVKew1sYZpHuVPo-mHvjk",
          authDomain: "aviatorsignal-ff90c.firebaseapp.com",
          projectId: "aviatorsignal-ff90c",
          storageBucket: "aviatorsignal-ff90c.firebasestorage.app",
          messagingSenderId: "656549146292",
          appId: "1:656549146292:web:f35944e4ae7b6db943f1e1",
          measurementId: "G-B5N5DG523J"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let MY_DEVICE_ID = "";
        let unsub = null;

        // --- බව්සර් එක කුමක් වුවත් එකම ID එකක් ලබා ගැනීම ---
        async function initFingerprint() {
            const fpPromise = FingerprintJS.load();
            const fp = await fpPromise;
            const result = await fp.get();
            // visitorId යනු එම උපකරණයට ආවේණික අංකයයි
            MY_DEVICE_ID = "ALPHA-" + result.visitorId.toUpperCase();
            document.getElementById('displayDevID').innerText = MY_DEVICE_ID;
        }
        initFingerprint();

        async function handleLogin() {
            const email = document.getElementById('userEmail').value.trim();
            const pass = document.getElementById('userPass').value.trim();
            const btn = document.getElementById('loginBtn');

            if(!email || !pass) { showError("Enter credentials"); return; }
            btn.innerText = "VERIFYING...";

            try {
                const userCred = await auth.signInWithEmailAndPassword(email, pass);
                const uid = userCred.user.uid;

                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('deviceVerifySection').style.display = 'block';

                // Real-time Check
                unsub = db.collection("users").doc(uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const allowed = data.allowed_devices || [];
                        if (allowed.includes(MY_DEVICE_ID)) {
                            if (data.expiryDate && new Date(data.expiryDate) > new Date()) {
                                enterApp();
                            }
                        }
                    }
                });
            } catch (err) {
                showError("Invalid Credentials");
            } finally {
                btn.innerText = "LOGIN TO SYSTEM";
            }
        }

        function enterApp() {
            if(unsub) unsub();
            document.getElementById('deviceVerifySection').style.display = 'none';
            document.getElementById('mainAppSection').style.display = 'block';
        }

        function copyDeviceID() {
            navigator.clipboard.writeText(MY_DEVICE_ID).then(() => { alert("Device ID Copied!"); });
        }

        function showError(msg) {
            const err = document.getElementById('loginError');
            err.innerText = msg; err.style.display = 'block';
        }

        // --- Signal Generator Logic ---
        let signalTextToCopy = "";
        function processImage() {
            const file = document.getElementById('imageInput').files[0];
            if (!file) { alert("Upload screenshot!"); return; }
            document.getElementById('analyzeBtn').innerText = "Analyzing...";
            
            Tesseract.recognize(file, 'eng').then(() => {
                const now = new Date();
                const fmt = (m) => new Date(now.getTime() + m * 60000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }).toLowerCase();
                const r1 = `${fmt(4)} – ${fmt(6)}`;
                const r2 = `${fmt(12)} – ${fmt(15)}`;
                const r3 = `${fmt(25)} – ${fmt(28)}`;

                document.getElementById('outputContent').innerHTML = `
                    <div class="signal-row"><span class="time-range">${r1}</span><span class="purple-text">Purple</span></div>
                    <div class="signal-row"><span class="time-range">${r2}</span><span class="purple-text">Stable</span></div>
                    <div class="signal-row"><span class="time-range">${r3}</span><span class="pink-text">Pink (10x)</span></div>
                `;
                signalTextToCopy = `ALPHA-SIGNAL:\n1. ${r1}\n2. ${r2}\n3. ${r3}`;
                document.getElementById('outputWrapper').style.display = "block";
                document.getElementById('analyzeBtn').innerText = "Generate Signals";
            });
        }

        function copyToClipboard() {
            const copyArea = document.getElementById('hidden-copy-area');
            copyArea.value = signalTextToCopy; copyArea.select();
            navigator.clipboard.writeText(signalTextToCopy).then(() => {
                alert("Signals Copied!");
            });
        }
    </script>
</body>
</html>
