<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA-SIGNAL | Ultra Pro AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff0055;
            --bg-dark: #030305;
            --card-bg: rgba(15, 15, 25, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            overflow-x: hidden;
        }

        .premium-container, .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            text-align: center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RGB Circle Logo Container */
        .logo-container {
            width: 130px; height: 130px; margin: 0 auto 25px auto;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: relative; padding: 4px; box-shadow: 0 0 25px rgba(0, 242, 255, 0.4); overflow: hidden;
        }
        .logo-container::before {
            content: ''; position: absolute; width: 200%; height: 200%;
            background: conic-gradient(#ff0055, #ffdd00, #00ff88, #00f2ff, #7000ff, #ff0055);
            animation: spinRGB 4s linear infinite;
        }
        @keyframes spinRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo-img { width: 122px; height: 122px; border-radius: 50%; object-fit: cover; border: 3px solid #000; position: relative; z-index: 1; }

        .header { text-align: center; margin-bottom: 35px; }
        .brand-logo { 
            font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-logo span { color: var(--primary); -webkit-text-fill-color: var(--primary); }
        .sub-header { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 4px; margin-top: 8px; font-weight: 700; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 10px; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .std-input {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 15px; color: white; outline: none; transition: 0.3s;
        }
        .std-input:focus { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }

        .analyze-btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white; border: none; padding: 18px; border-radius: 18px; width: 100%; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .device-id-box {
            background: #000; padding: 20px; border-radius: 18px; border: 1px solid var(--accent);
            margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 12px 20px; background: rgba(255,255,255,0.03); border-radius: 50px; font-size: 10px; border: 1px solid var(--glass-border); }
        .expiry-tag { color: #00ff88; font-weight: 700; }

        .file-label { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed rgba(0, 242, 255, 0.2); border-radius: 24px; padding: 40px 20px; cursor: pointer; background: rgba(255, 255, 255, 0.02); margin-bottom: 25px; }
        .result-card { background: rgba(0, 0, 0, 0.3); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border); text-align: left; }
        .signal-row { padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; gap: 5px; }
        .time-range { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: #fff; }
        
        .logout-btn { background: none; border: none; color: #ff4d4d; font-size: 11px; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Aviator.mp3" type="audio/mpeg">
    </audio>

    <div id="loginScreen" class="auth-card" style="display: none;">
        <div class="logo-container">
            <img src="suwahas.png" alt="Logo" class="logo-img">
        </div>
        <div class="header">
            <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
            <div class="sub-header">Secure Neural Access</div>
        </div>
        <div class="input-group">
            <label>Neural Identity</label>
            <input type="email" id="email" class="std-input" placeholder="admin@alpha.com">
        </div>
        <div class="input-group">
            <label>Access Key</label>
            <input type="password" id="password" class="std-input" placeholder="••••••••">
        </div>
        <button class="analyze-btn" id="loginBtn">INITIALIZE CORE</button>
        <div id="loginError" style="color: var(--accent); font-size: 12px; margin-top: 15px; display: none;"></div>
    </div>

    <div id="deviceLockScreen" class="auth-card" style="display: none;">
        <div class="header">
            <div class="brand-logo" style="filter: hue-rotate(290deg);">DEVICE<span>LOCK</span></div>
            <div class="sub-header">Unauthorized Hardware</div>
        </div>
        <div class="device-id-box">
            <p id="showDeviceId" style="font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 700; color: var(--accent); word-break: break-all; margin-bottom: 15px;"></p>
            <button onclick="copyDevId()" style="background:var(--accent); border:none; color: white; padding: 10px 20px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer;">COPY IDENTITY</button>
        </div>
        <button class="analyze-btn" onclick="window.open('https://wa.me/94725019800')" style="background: #25D366; margin-top: 10px;">WHATSAPP ADMIN</button>
        <button class="logout-btn" onclick="auth.signOut(); location.reload();">BACK</button>
    </div>

    <div class="premium-container" id="mainApp" style="display: none;">
        <div class="status-bar">
            <span id="userEmail" style="color: var(--primary); font-weight: 600;">...</span>
            <span id="expiryTime" class="expiry-tag">SYNC...</span>
        </div>
        <div class="upload-zone">
            <input type="file" id="imageInput" style="display:none;" accept="image/*">
            <label for="imageInput" class="file-label" id="fileLabel">
                <i class="fa-solid fa-atom" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
                <span style="font-weight: 600; color: #fff;">Upload History Scan</span>
            </label>
            <button class="analyze-btn" id="analyzeBtn" onclick="processImage()">EXECUTE HEURISTIC SCAN</button>
        </div>
        <div id="outputWrapper" style="display: none; margin-top: 30px;">
            <div class="result-card" id="outputContent"></div>
            <button class="analyze-btn" style="margin-top: 15px; background: transparent; border: 1px solid var(--glass-border);" onclick="location.reload()">NEW SCAN</button>
        </div>
        <button class="logout-btn" onclick="auth.signOut(); location.reload();">TERMINATE UPLINK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBmLvGb0vXkJhKVKew1sYZpHuVPo-mHvjk",
          authDomain: "aviatorsignal-ff90c.firebaseapp.com",
          projectId: "aviatorsignal-ff90c",
          storageBucket: "aviatorsignal-ff90c.firebasestorage.app",
          messagingSenderId: "656549146292",
          appId: "1:656549146292:web:f35944e4ae7b6db943f1e1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const music = document.getElementById('bgMusic');

        function playMusic() {
            music.play().catch(e => console.log("Interaction required for audio."));
        }

        // Login with Music
        document.getElementById('loginBtn').addEventListener('click', () => {
            playMusic();
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return;
            auth.signInWithEmailAndPassword(e, p).catch(err => {
                const errDiv = document.getElementById('loginError');
                errDiv.style.display = 'block';
                errDiv.innerText = "Access Denied: " + err.message;
            });
        });

        function getDeviceId() {
            let id = localStorage.getItem("alpha_dev_id");
            if (!id) {
                id = 'ALPHA-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem("alpha_dev_id", id);
            }
            return id;
        }

        auth.onAuthStateChanged(user => {
            if (user) { 
                checkAccess(user); 
                playMusic();
            } else { 
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('deviceLockScreen').style.display = 'none';
            }
        });

        function checkAccess(user) {
            const devId = getDeviceId();
            db.collection("users").doc(user.uid).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.allowed_devices && data.allowed_devices.includes(devId)) {
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('deviceLockScreen').style.display = 'none';
                        document.getElementById('mainApp').style.display = 'block';
                        document.getElementById('userEmail').innerText = user.email.split('@')[0].toUpperCase();
                        handleExpiry(data.expiryDate);
                    } else { showLock(devId); }
                } else { showLock(devId); }
            });
        }

        function showLock(id) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('deviceLockScreen').style.display = 'block';
            document.getElementById('showDeviceId').innerText = id;
        }

        function handleExpiry(exp) {
            if(!exp) { document.getElementById('expiryTime').innerText = "LIFETIME"; return; }
            setInterval(() => {
                const now = new Date().getTime();
                const diff = new Date(exp).getTime() - now;
                if(diff <= 0) location.reload();
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('expiryTime').innerText = `${h}H ${m}M ${s}S LEFT`;
            }, 1000);
        }

        async function processImage() {
            const file = document.getElementById('imageInput').files[0];
            if (!file) { alert("Please select a file."); return; }
            const btn = document.getElementById('analyzeBtn');
            btn.innerText = "DECODING...";
            btn.disabled = true;

            try {
                await Tesseract.recognize(file, 'eng');
                const now = new Date();
                const fmt = (m) => new Date(now.getTime() + m * 60000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                
                document.getElementById('outputContent').innerHTML = `
                    <div class="signal-row"><span style="color:#555;font-size:10px;text-transform:uppercase;">Entry 1</span><span class="time-range">${fmt(3)} - ${fmt(5)}</span><span style="color:var(--primary);font-size:11px;">2x+ Predicted</span></div>
                    <div class="signal-row" style="border:none;"><span style="color:#555;font-size:10px;text-transform:uppercase;">High Odd</span><span class="time-range">${fmt(15)} - ${fmt(20)}</span><span style="color:var(--accent);font-size:11px;">10x+ Predicted</span></div>
                `;
                document.getElementById('outputWrapper').style.display = "block";
            } catch (e) { alert("Scan Failed."); }
            btn.innerText = "EXECUTE HEURISTIC SCAN";
            btn.disabled = false;
        }

        function copyDevId() { navigator.clipboard.writeText(getDeviceId()); alert("Identity Copied!"); }
    </script>
</body>
</html>
