<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-SIGNAL | Secure AI Analyser</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body {
            background-color: #060608;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a24 0%, #060608 70%);
        }
        .premium-container {
            background: rgba(16, 16, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            width: 100%;
            max-width: 520px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .brand-logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .brand-logo span { color: #ff0040; text-shadow: 0 0 15px rgba(255, 0, 64, 0.5); }
        
        /* Auth Styles */
        #authSection { display: block; }
        #mainApp { display: none; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none;
        }
        .error-msg { color: #ff4d4d; font-size: 12px; margin-top: 5px; text-align: center; display: none; }

        /* Signal Styles */
        .file-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px dashed rgba(255, 0, 64, 0.3); border-radius: 20px; padding: 30px;
            cursor: pointer; background: rgba(255, 255, 255, 0.02); color: #888; margin-bottom: 15px;
        }
        .analyze-btn {
            background: linear-gradient(135deg, #ff0040, #ff4d79);
            color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; 
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .copy-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 15px; border-radius: 12px; width: 100%; font-size: 15px; 
            cursor: pointer; margin-top: 20px; display: none;
        }
        #outputWrapper { display: none; margin-top: 30px; }
        .result-card { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .signal-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .time-range { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: #fff; display: block; }
        .purple-text { color: #a333ff; }
        .pink-text { color: #ff0040; }
        
        .device-info { font-size: 10px; color: #555; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="premium-container">
        <div class="header">
            <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
            <div id="statusTag" style="font-size: 10px; color: #ff0040; letter-spacing: 2px;">SECURE ACCESS</div>
        </div>

        <div id="authSection">
            <div class="input-group">
                <input type="email" id="userEmail" placeholder="Enter Email">
            </div>
            <div class="input-group">
                <input type="password" id="userPass" placeholder="Enter Password">
            </div>
            <button class="analyze-btn" onclick="userLogin()">UNLOCK ACCESS</button>
            <p id="loginError" class="error-msg"></p>
        </div>

        <div id="mainApp">
            <div class="upload-zone">
                <input type="file" id="imageInput" style="display:none;" accept="image/*">
                <label for="imageInput" class="file-label" id="fileLabel">
                    <span id="labelText">Upload History Screenshot</span>
                </label>
                <button class="analyze-btn" id="analyzeBtn" onclick="processImage()">Generate Signals</button>
            </div>

            <div id="outputWrapper">
                <div class="result-card" id="outputContent"></div>
                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy Signals Text</button>
            </div>
            
            <button onclick="firebase.auth().signOut()" style="background:none; border:none; color:#555; width:100%; margin-top:20px; cursor:pointer; font-size:12px;">Logout Account</button>
        </div>

        <div class="device-info" id="devDisplay"></div>
    </div>

    <textarea id="hidden-copy-area" style="display:none;"></textarea>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
          apiKey: "AIzaSyBmLvGb0vXkJhKVKew1sYZpHuVPo-mHvjk",
          authDomain: "aviatorsignal-ff90c.firebaseapp.com",
          projectId: "aviatorsignal-ff90c",
          storageBucket: "aviatorsignal-ff90c.firebasestorage.app",
          messagingSenderId: "656549146292",
          appId: "1:656549146292:web:f35944e4ae7b6db943f1e1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- DEVICE ID LOGIC ---
        function getDeviceId() {
            let id = localStorage.getItem('alpha_device_id');
            if (!id) {
                id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('alpha_device_id', id);
            }
            return id;
        }
        const myDeviceId = getDeviceId();
        document.getElementById('devDisplay').innerText = "Device ID: " + myDeviceId;

        // --- AUTHENTICATION ---
        function userLogin() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const err = document.getElementById('loginError');

            auth.signInWithEmailAndPassword(email, pass)
                .catch(e => {
                    err.innerText = "Invalid credentials or account inactive.";
                    err.style.display = "block";
                });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                verifySubscription(user);
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        // --- SUBSCRIPTION & DEVICE VALIDATION ---
        async function verifySubscription(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            
            if (doc.exists) {
                const data = doc.data();
                const now = new Date();
                const expiry = new Date(data.expiryDate);
                const allowedDevices = data.allowed_devices || [];

                // Check Expiry
                if (expiry < now) {
                    alert("Your subscription has expired!");
                    auth.signOut();
                    return;
                }

                // Check Device Lock
                if (allowedDevices.length > 0 && !allowedDevices.includes(myDeviceId)) {
                    alert("This device is not authorized! Please contact admin with ID: " + myDeviceId);
                    auth.signOut();
                    return;
                }

                // If all good, show app
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('statusTag').innerText = "SYSTEM ACTIVE";
                document.getElementById('statusTag').style.color = "#00ff88";
            } else {
                alert("Account data not found.");
                auth.signOut();
            }
        }

        // --- IMAGE PROCESSING & SIGNALS ---
        const imageInput = document.getElementById('imageInput');
        imageInput.addEventListener('change', function() {
            if(this.files[0]) document.getElementById('labelText').innerText = this.files[0].name;
        });

        function processImage() {
            const file = imageInput.files[0];
            if (!file) { alert("Please upload a screenshot!"); return; }

            const btn = document.getElementById('analyzeBtn');
            btn.innerText = "Analyzing Pattern...";
            btn.disabled = true;
            
            Tesseract.recognize(file, 'eng').then(() => {
                const now = new Date();
                const fmt = (m) => new Date(now.getTime() + m * 60000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }).toLowerCase();
                
                const r1 = `${fmt(4)} – ${fmt(6)}`;
                const r2 = `${fmt(12)} – ${fmt(15)}`;
                const r3 = `${fmt(25)} – ${fmt(28)}`;

                document.getElementById('outputContent').innerHTML = `
                    <div class="signal-row"><span class="label">Immediate</span><span class="time-range">${r1}</span><span class="purple-text">Purple Opportunity</span></div>
                    <div class="signal-row"><span class="label">Main</span><span class="time-range">${r2}</span><span class="purple-text">Stable Trend</span></div>
                    <div class="signal-row"><span class="label">High-Odd (10x+)</span><span class="time-range">${r3}</span><span class="pink-text">Pink Probability</span></div>
                `;

                signalTextToCopy = `🚀 ALPHA-SIGNAL PREDICTIONS 🚀\n\n1. Immediate: ${r1}\n2. Main: ${r2}\n3. High-Odd: ${r3}\n\nGood Luck!`;

                document.getElementById('outputWrapper').style.display = "block";
                document.getElementById('copyBtn').style.display = "block";
                btn.innerText = "Generate Signals";
                btn.disabled = false;
            });
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(signalTextToCopy).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "COPIED ✅";
                setTimeout(() => btn.innerText = "Copy Signals Text", 2000);
            });
        }
    </script>
</body>
</html>
