<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-SIGNAL | Secure Access</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body {
            background-color: #060608;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a24 0%, #060608 70%);
        }
        .premium-container {
            background: rgba(16, 16, 20, 0.95);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 28px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            text-align: center;
        }
        .brand-logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 5px; }
        .brand-logo span { color: #ff0040; text-shadow: 0 0 15px rgba(255, 0, 64, 0.5); }
        .sub-header { font-size: 11px; color: #8b9bb4; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        /* Form Styles */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; margin-left: 5px; }
        .input-group input { 
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; 
            color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #ff0040; box-shadow: 0 0 10px rgba(255, 0, 64, 0.1); }

        .action-btn {
            background: linear-gradient(135deg, #ff0040, #ff4d79);
            color: white; border: none; padding: 16px; border-radius: 12px; 
            width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 0, 64, 0.2);
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(255, 0, 64, 0.3); }

        /* Device ID Display Section */
        #deviceSection { display: none; margin-top: 20px; animation: fadeIn 0.5s; }
        .dev-box {
            background: rgba(0, 242, 255, 0.05);
            border: 1px dashed rgba(0, 242, 255, 0.3);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .dev-label { font-size: 11px; color: #00f2ff; text-transform: uppercase; margin-bottom: 10px; }
        .id-text { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: #fff; word-break: break-all; }
        
        .copy-link {
            color: #00f2ff; font-size: 13px; cursor: pointer; text-decoration: underline;
            display: inline-block; margin-top: 10px;
        }

        /* Signal Section */
        #mainSignalApp { display: none; }

        .error-msg { 
            color: #ff4d4d; font-size: 12px; margin-bottom: 15px; display: none; 
            background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="premium-container">
        <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
        <div class="sub-header" id="statusHeader">Authentication Required</div>

        <div id="loginSection">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" placeholder="yourname@mail.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="passInput" placeholder="••••••••">
            </div>
            <div id="loginError" class="error-msg"></div>
            <button class="action-btn" onclick="handleAuth()">LOGIN TO SYSTEM</button>
        </div>

        <div id="deviceSection">
            <div class="dev-box">
                <div class="dev-label">Your Unique Device ID</div>
                <div class="id-text" id="displayID">DEV-XXXXXX</div>
                <div class="copy-link" onclick="copyID()"><i class="fa-regular fa-copy"></i> Copy ID & Send to Admin</div>
            </div>
            <p style="font-size: 11px; color: #666;">This device is not registered. Please send the ID above to the administrator for activation.</p>
            <button class="action-btn" style="margin-top:20px; background: #333;" onclick="location.reload()">LOGOUT</button>
        </div>

        <div id="mainSignalApp">
            <p style="color: #00ff88; margin-bottom: 20px;"><i class="fa-solid fa-circle-check"></i> System Active</p>
            <button class="action-btn" onclick="alert('Signal Generator Opening...')">OPEN ANALYSER</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
          apiKey: "AIzaSyBmLvGb0vXkJhKVKew1sYZpHuVPo-mHvjk",
          authDomain: "aviatorsignal-ff90c.firebaseapp.com",
          projectId: "aviatorsignal-ff90c",
          storageBucket: "aviatorsignal-ff90c.firebasestorage.app",
          messagingSenderId: "656549146292",
          appId: "1:656549146292:web:f35944e4ae7b6db943f1e1"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Device ID එක සෑදීම
        function getDeviceID() {
            let id = localStorage.getItem('alpha_device_token');
            if(!id) {
                id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('alpha_device_token', id);
            }
            return id;
        }
        const MY_ID = getDeviceID();

        async function handleAuth() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            const error = document.getElementById('loginError');

            if(!email || !pass) { showError("Enter credentials"); return; }

            try {
                const userCred = await auth.signInWithEmailAndPassword(email, pass);
                const uid = userCred.user.uid;
                
                // Firestore දත්ත පරීක්ෂාව
                const userDoc = await db.collection("users").doc(uid).get();
                if(!userDoc.exists) { showError("No database record found."); return; }

                const data = userDoc.data();
                const allowedDevices = data.allowed_devices || [];

                // පියවර 1: Device ID එක Register වී නැත්නම් එය පෙන්වන්න
                if(allowedDevices.length === 0 || !allowedDevices.includes(MY_ID)) {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('deviceSection').style.display = 'block';
                    document.getElementById('displayID').innerText = MY_ID;
                    document.getElementById('statusHeader').innerText = "Device Registration";
                } 
                // පියවර 2: Expiry Check
                else if(data.expiryDate && new Date(data.expiryDate) < new Date()) {
                    showError("Your subscription has expired!");
                }
                // පියවර 3: සියල්ල නිවැරදි නම් App එක පෙන්වන්න
                else {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('mainSignalApp').style.display = 'block';
                    document.getElementById('statusHeader').innerText = "Access Granted";
                }

            } catch (err) {
                showError("Login Failed: " + err.message);
            }
        }

        function copyID() {
            navigator.clipboard.writeText(MY_ID);
            alert("Device ID Copied: " + MY_ID + "\nNow send this to Admin.");
        }

        function showError(msg) {
            const err = document.getElementById('loginError');
            err.innerText = msg;
            err.style.display = 'block';
        }
    </script>
</body>
</html>
