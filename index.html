<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-SIGNAL | Secure Login</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body {
            background-color: #060608;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a24 0%, #060608 70%);
        }
        .premium-container {
            background: rgba(16, 16, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            text-align: center;
        }
        .brand-logo { font-size: 32px; font-weight: 700; margin-bottom: 20px; }
        .brand-logo span { color: #ff0040; }
        
        #authSection, #deviceBlockedSection, #mainApp { display: none; }

        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none;
        }
        .btn {
            background: linear-gradient(135deg, #ff0040, #ff4d79);
            color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; 
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn:active { transform: scale(0.98); }
        .error-msg { color: #ff4d4d; font-size: 13px; margin-top: 15px; }

        /* Device Blocked View */
        .dev-box {
            background: rgba(255, 0, 64, 0.05);
            border: 1px dashed #ff0040;
            padding: 20px;
            border-radius: 15px;
            font-family: 'Space Mono', monospace;
            color: #ff4d4d;
            margin: 20px 0;
            word-break: break-all;
            position: relative;
        }
        .copy-badge {
            background: #ff0040; color: white; font-size: 10px; padding: 4px 8px;
            border-radius: 5px; cursor: pointer; margin-top: 10px; display: inline-block;
        }

        /* App View */
        .file-label {
            display: block; border: 2px dashed rgba(255, 0, 64, 0.3);
            padding: 30px; border-radius: 20px; cursor: pointer; margin-bottom: 15px;
        }
        #outputWrapper { margin-top: 25px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="premium-container">
        <div class="brand-logo">ALPHA<span>SIGNAL</span></div>

        <div id="authSection">
            <p style="color: #888; margin-bottom: 20px;">Secure Account Login</p>
            <div class="input-group">
                <input type="email" id="userEmail" placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="userPass" placeholder="Password">
            </div>
            <button class="btn" onclick="userLogin()">LOGIN SYSTEM</button>
            <p id="loginError" class="error-msg" style="display:none;"></p>
        </div>

        <div id="deviceBlockedSection">
            <h3 style="color: #ff4d4d; letter-spacing: 1px;">DEVICE NOT AUTHORIZED</h3>
            <p style="font-size: 13px; color: #aaa; margin-top: 10px;">Your device is not registered. Please copy and send this ID to Admin:</p>
            
            <div class="dev-box">
                <span id="displayDevId" style="font-size: 18px; font-weight: bold;"></span><br>
                <div class="copy-badge" id="copyDevBtn" onclick="copyDeviceId()">CLICK TO COPY ID</div>
            </div>

            <button class="btn" style="background: #1a1a24; border: 1px solid #333;" onclick="location.reload()">RE-CHECK ACCESS</button>
            <p onclick="firebase.auth().signOut()" style="margin-top: 20px; font-size: 12px; cursor: pointer; color: #555; text-decoration: underline;">Logout & Switch Account</p>
        </div>

        <div id="mainApp">
            <div id="status" style="color: #00ff88; font-size: 11px; margin-bottom: 20px; letter-spacing: 1px;">● SYSTEM ACTIVE & ENCRYPTED</div>
            <input type="file" id="imageInput" style="display:none;" accept="image/*">
            <label for="imageInput" class="file-label">
                <span id="labelText" style="color: #888;">Drop History Screenshot Here</span>
            </label>
            <button class="btn" id="analyzeBtn" onclick="processImage()">GENERATE AI SIGNALS</button>

            <div id="outputWrapper" style="display:none;">
                <div id="outputContent"></div>
                <button class="btn" style="background: rgba(255,255,255,0.1); border: 1px solid #333;" onclick="copySignals()">COPY RESULTS</button>
            </div>
            <p onclick="firebase.auth().signOut()" style="margin-top: 30px; font-size: 12px; cursor: pointer; color: #444;">Logout</p>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyBmLvGb0vXkJhKVKew1sYZpHuVPo-mHvjk",
          authDomain: "aviatorsignal-ff90c.firebaseapp.com",
          projectId: "aviatorsignal-ff90c",
          storageBucket: "aviatorsignal-ff90c.firebasestorage.app",
          messagingSenderId: "656549146292",
          appId: "1:656549146292:web:f35944e4ae7b6db943f1e1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Device ID Generation
        const myDeviceId = (() => {
            let id = localStorage.getItem('alpha_dev_id');
            if (!id) {
                id = 'ALPHA-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('alpha_dev_id', id);
            }
            return id;
        })();

        // Auth Listener
        auth.onAuthStateChanged(user => {
            hideAll();
            if (user) {
                verifyAccess(user);
            } else {
                document.getElementById('authSection').style.display = 'block';
            }
        });

        function userLogin() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const btn = event.target;
            btn.innerText = "VERIFYING...";
            
            auth.signInWithEmailAndPassword(email, pass).catch(err => {
                const errDiv = document.getElementById('loginError');
                errDiv.innerText = "Login Failed: Check Email/Password";
                errDiv.style.display = 'block';
                btn.innerText = "LOGIN SYSTEM";
            });
        }

        async function verifyAccess(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists) {
                const data = doc.data();
                const now = new Date();
                const expiry = new Date(data.expiryDate);
                const allowedDevices = data.allowed_devices || [];

                if (expiry < now) {
                    alert("Your access has expired. Please renew.");
                    auth.signOut();
                    return;
                }

                if (allowedDevices.includes(myDeviceId)) {
                    document.getElementById('mainApp').style.display = 'block';
                } else {
                    document.getElementById('displayDevId').innerText = myDeviceId;
                    document.getElementById('deviceBlockedSection').style.display = 'block';
                }
            } else {
                auth.signOut();
            }
        }

        function copyDeviceId() {
            navigator.clipboard.writeText(myDeviceId).then(() => {
                const copyBtn = document.getElementById('copyDevBtn');
                copyBtn.innerText = "COPIED! ✅";
                copyBtn.style.background = "#00ff88";
                setTimeout(() => {
                    copyBtn.innerText = "CLICK TO COPY ID";
                    copyBtn.style.background = "#ff0040";
                }, 2000);
            });
        }

        function hideAll() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('deviceBlockedSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'none';
        }

        // Previous Signal Logic
        function processImage() {
            const file = document.getElementById('imageInput').files[0];
            if(!file) return alert("Please upload history screenshot first!");
            const btn = document.getElementById('analyzeBtn');
            btn.innerText = "ANALYZING...";
            btn.disabled = true;

            Tesseract.recognize(file, 'eng').then(() => {
                const now = new Date();
                const fmt = (m) => new Date(now.getTime() + m * 60000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                document.getElementById('outputContent').innerHTML = `
                    <div style="margin-bottom:10px;">
                        <span style="color:#888; font-size:12px;">PROBABILITY TIME</span><br>
                        <span style="font-size:22px; font-weight:bold;">${fmt(4)} - ${fmt(7)}</span>
                    </div>
                    <div style="color:#a333ff; font-weight:bold;">EXPECTED: PURPLE (2.00x+)</div>
                `;
                document.getElementById('outputWrapper').style.display = 'block';
                btn.innerText = "GENERATE AI SIGNALS";
                btn.disabled = false;
            });
        }

        function copySignals() {
            const text = document.getElementById('outputContent').innerText;
            navigator.clipboard.writeText(text);
            alert("Signals Copied!");
        }
    </script>
</body>
</html>
