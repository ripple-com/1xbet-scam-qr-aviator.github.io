<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA-SIGNAL | Ultra Pro AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff0055;
            --bg-dark: #030305;
            --card-bg: rgba(15, 15, 25, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            overflow-x: hidden;
        }

        /* --- Global Elements --- */
        .premium-container, .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 35px; }
        .brand-logo { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 28px; 
            font-weight: 700; 
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-logo span { color: var(--primary); -webkit-text-fill-color: var(--primary); filter: drop-shadow(0 0 10px var(--primary)); }
        .sub-header { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 4px; margin-top: 8px; font-weight: 700; }

        /* --- Inputs & Buttons --- */
        .input-group { margin-bottom: 25px; }
        .input-group label { font-size: 10px; color: var(--primary); font-weight: 700; margin-left: 5px; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .std-input {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 15px; color: white; font-size: 15px; outline: none; transition: 0.3s;
        }
        .std-input:focus { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .analyze-btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white; border: none; padding: 18px; border-radius: 18px; width: 100%; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 8px 20px rgba(112, 0, 255, 0.3);
        }
        .analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(0, 242, 255, 0.4); }
        .analyze-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        /* --- Main Features --- */
        .file-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px dashed rgba(0, 242, 255, 0.2); border-radius: 24px; padding: 40px 20px;
            cursor: pointer; background: rgba(255, 255, 255, 0.02); color: #888; margin-bottom: 25px;
            transition: 0.3s;
        }
        .file-label:hover { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }

        .status-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; padding: 12px 20px; background: rgba(255,255,255,0.03); 
            border-radius: 50px; font-size: 10px; border: 1px solid var(--glass-border);
        }
        .expiry-tag { color: #00ff88; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* --- Output Design --- */
        .result-card { background: rgba(0, 0, 0, 0.3); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border); }
        .signal-row { 
            padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex; flex-direction: column; gap: 5px;
        }
        .label { font-size: 10px; color: #555; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .time-range { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: #fff; }
        .purple-text { color: var(--primary); font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .pink-text { color: var(--accent); font-size: 11px; font-weight: 700; text-transform: uppercase; }

        .copy-btn {
            background: transparent; border: 1px solid var(--glass-border);
            color: #aaa; padding: 15px; border-radius: 15px; width: 100%; font-size: 13px; cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .logout-btn { background: none; border: none; color: #ff4d4d; font-size: 11px; cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        .device-id-box {
            background: #000; padding: 20px; border-radius: 18px; border: 1px solid var(--accent); margin-bottom: 20px;
        }

        #outputWrapper { animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="loginScreen" class="auth-card" style="display: none;">
        <div class="header">
            <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
            <div class="sub-header">Secure Neural Access</div>
        </div>
        <div class="input-group">
            <label>Neural Identity (Email)</label>
            <input type="email" id="email" class="std-input" placeholder="admin@alpha.com">
        </div>
        <div class="input-group">
            <label>Access Key (Password)</label>
            <input type="password" id="password" class="std-input" placeholder="••••••••">
        </div>
        <button class="analyze-btn" id="loginBtn">INITIALIZE CORE</button>
        <div id="loginError" class="error-msg" style="color: var(--accent); font-size: 12px; margin-top: 15px; display: none;"></div>
    </div>

    <div id="deviceLockScreen" class="auth-card" style="display: none;">
        <div class="header">
            <div class="brand-logo" style="filter: hue-rotate(290deg);">DEVICE<span>LOCK</span></div>
            <div class="sub-header">Hardware Identity Mismatch</div>
        </div>
        <div class="device-id-box">
            <p style="font-size: 9px; color: #555; margin-bottom: 8px; letter-spacing: 2px;">VIRTUAL_DEVICE_ID</p>
            <p id="showDeviceId" style="font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 700; color: var(--accent); word-break: break-all; margin-bottom: 15px;"></p>
            <button onclick="copyDevId()" style="background:var(--accent); border:none; color: white; padding: 8px 15px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer;">COPY IDENTITY</button>
        </div>
        <p style="font-size: 12px; color: #888; margin-bottom: 25px; line-height: 1.6;">Your hardware signature is not registered in our neural network. Contact administrator for uplink.</p>
        <button class="analyze-btn" onclick="window.open('https://wa.me/94725019800')" style="background: #25D366; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2);">WHATSAPP ADMIN</button>
        <button class="logout-btn" style="margin-top: 25px; width: 100%;" onclick="auth.signOut(); location.reload();">RETURN TO LOGIN</button>
    </div>

    <div class="premium-container" id="mainApp" style="display: none;">
        <div class="status-bar">
            <span id="userEmail" style="color: var(--primary); font-weight: 600;">...</span>
            <span id="expiryTime" class="expiry-tag">SYNCHING...</span>
        </div>

        <div class="header">
            <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
            <div class="sub-header">AI Pattern Recognition v4.0</div>
        </div>

        <div class="upload-zone">
            <input type="file" id="imageInput" style="display:none;" accept="image/*">
            <label for="imageInput" class="file-label" id="fileLabel">
                <i class="fa-solid fa-atom" style="font-size: 40px; color: var(--primary); margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--primary));"></i>
                <span id="labelText" style="font-weight: 600; color: #fff;">Scan History Screenshot</span>
                <span style="font-size: 10px; margin-top: 5px;">PNG, JPG supported</span>
            </label>
            <button class="analyze-btn" id="analyzeBtn" onclick="processImage()">EXECUTE HEURISTIC SCAN</button>
        </div>

        <div id="outputWrapper" style="display: none; margin-top: 30px;">
            <div class="result-card" id="outputContent"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()"><i class="fa-regular fa-copy"></i> COPY ANALYSIS DATA</button>
        </div>

        <div style="margin-top: 40px; text-align: center; border-top: 1px solid var(--glass-border); padding-top: 20px;">
            <button class="logout-btn" onclick="auth.signOut(); location.reload();"><i class="fa-solid fa-power-off"></i> TERMINATE UPLINK</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // ORIGINAL FIREBASE CONFIG
        const firebaseConfig = {
          apiKey: "AIzaSyBmLvGb0vXkJhKVKew1sYZpHuVPo-mHvjk",
          authDomain: "aviatorsignal-ff90c.firebaseapp.com",
          projectId: "aviatorsignal-ff90c",
          storageBucket: "aviatorsignal-ff90c.firebasestorage.app",
          messagingSenderId: "656549146292",
          appId: "1:656549146292:web:f35944e4ae7b6db943f1e1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Device ID logic
        function getDeviceId() {
            let id = localStorage.getItem("alpha_dev_id");
            if (!id) {
                id = 'ALPHA-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem("alpha_dev_id", id);
            }
            return id;
        }

        function copyDevId() {
            navigator.clipboard.writeText(getDeviceId());
            alert("Device Identity Copied to Clipboard!");
        }

        // Auth Listener
        auth.onAuthStateChanged(user => {
            if (user) {
                checkAccess(user);
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('deviceLockScreen').style.display = 'none';
            }
        });

        function checkAccess(user) {
            const devId = getDeviceId();
            db.collection("users").doc(user.uid).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.allowed_devices && data.allowed_devices.includes(devId)) {
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('deviceLockScreen').style.display = 'none';
                        document.getElementById('mainApp').style.display = 'block';
                        document.getElementById('userEmail').innerText = user.email.split('@')[0].toUpperCase();
                        handleExpiry(data.expiryDate);
                    } else {
                        showLock(devId);
                    }
                } else {
                    showLock(devId);
                }
            });
        }

        function showLock(id) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('deviceLockScreen').style.display = 'block';
            document.getElementById('showDeviceId').innerText = id;
        }

        function handleExpiry(exp) {
            if(!exp) { document.getElementById('expiryTime').innerText = "LIFETIME ACCESS"; return; }
            const expiry = new Date(exp).getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = expiry - now;
                if(diff <= 0) { auth.signOut(); location.reload(); }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('expiryTime').innerText = `${h}H ${m}M ${s}S REMAINING`;
            }, 1000);
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return;
            const btn = document.getElementById('loginBtn');
            btn.innerText = "AUTHENTICATING...";
            auth.signInWithEmailAndPassword(e, p).catch(err => {
                const errDiv = document.getElementById('loginError');
                errDiv.style.display = 'block';
                errDiv.innerText = "ACCESS DENIED: " + err.message;
                btn.innerText = "INITIALIZE CORE";
            });
        });

        // --- SIGNAL GENERATOR ---
        let signalTextToCopy = "";
        const imageInput = document.getElementById('imageInput');
        imageInput.addEventListener('change', function() {
            if(this.files[0]) document.getElementById('labelText').innerText = this.files[0].name;
        });

        async function processImage() {
            const file = imageInput.files[0];
            if (!file) { alert("ERROR: Upload history sequence!"); return; }

            const btn = document.getElementById('analyzeBtn');
            btn.innerText = "NEURAL PROCESSING...";
            btn.disabled = true;
            
            try {
                const result = await Tesseract.recognize(file, 'eng');
                const extractedText = result.data.text;
                const numbers = extractedText.match(/\d+(\.\d+)?/g);
                let offset = 0;

                if (numbers) {
                    const maxOdd = Math.max(...numbers.map(Number));
                    offset = maxOdd > 10 ? 5 : 2; 
                }

                const now = new Date();
                const fmt = (m) => new Date(now.getTime() + m * 60000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                
                const r1 = `${fmt(offset + 2)} - ${fmt(offset + 4)}`;
                const r2 = `${fmt(offset + 10)} - ${fmt(offset + 13)}`;
                const r3 = `${fmt(offset + 22)} - ${fmt(offset + 25)}`;

                document.getElementById('outputContent').innerHTML = `
                    <div class="signal-row">
                        <span class="label">Sequence Status</span>
                        <p style="font-size:12px; color:#00ff88; font-weight:700;"><i class="fa-solid fa-circle-check"></i> SCAN COMPLETE / PATTERN MATCHED</p>
                    </div>
                    <div class="signal-row">
                        <span class="label">Primary Entry</span>
                        <span class="time-range">${r1}</span><span class="purple-text">Target: 2.00x+</span>
                    </div>
                    <div class="signal-row">
                        <span class="label">Stability Zone</span>
                        <span class="time-range">${r2}</span><span class="purple-text">Accumulation Trend</span>
                    </div>
                    <div class="signal-row" style="border:none;">
                        <span class="label">Extreme Probability (Pink)</span>
                        <span class="time-range">${r3}</span><span class="pink-text">High Volatility (10x+)</span>
                    </div>
                `;

                signalTextToCopy = `⚡ ALPHA-SIGNAL NEURAL REPORT ⚡\n\n1. PRIMARY: ${r1}\n2. STABILITY: ${r2}\n3. EXTREME: ${r3}\n\nGenerated by Alpha AI Engine.`;

                document.getElementById('outputWrapper').style.display = "block";
            } catch (error) {
                alert("OCR Error: Neural scan failed. Ensure clear screenshot.");
            } finally {
                btn.innerText = "EXECUTE HEURISTIC SCAN";
                btn.disabled = false;
            }
        }

        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(signalTextToCopy);
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = "<i class='fa-solid fa-check'></i> DATA SYNCED TO CLIPBOARD";
                btn.style.color = "#00ff88";
                btn.style.borderColor = "#00ff88";
                setTimeout(() => { 
                    btn.innerHTML = "<i class='fa-regular fa-copy'></i> COPY ANALYSIS DATA"; 
                    btn.style.color = "#aaa";
                    btn.style.borderColor = "var(--glass-border)";
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }
    </script>
</body>
</html>
