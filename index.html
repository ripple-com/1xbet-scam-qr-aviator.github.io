<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-SIGNAL | User Access</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body {
            background-color: #060608;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a24 0%, #060608 70%);
        }
        .premium-container {
            background: rgba(16, 16, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            width: 100%;
            max-width: 520px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
        }
        .header { text-align: center; margin-bottom: 35px; }
        .brand-logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .brand-logo span { color: #ff0040; text-shadow: 0 0 15px rgba(255, 0, 64, 0.5); }
        .sub-header { font-size: 11px; color: #9090a0; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        
        /* Login Section */
        #loginSection { display: block; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; }
        .input-group input { 
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; 
            color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #ff0040; }
        .error-msg { color: #ff4d79; font-size: 12px; margin-bottom: 15px; display: none; text-align: center; border: 1px solid #ff4d7930; padding: 10px; border-radius: 8px; background: #ff4d7910; }

        /* Main App Section */
        #mainAppSection { display: none; }
        .file-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px dashed rgba(255, 0, 64, 0.3); border-radius: 20px;
            padding: 30px; cursor: pointer; background: rgba(255, 255, 255, 0.02);
            color: #888; margin-bottom: 15px;
        }
        .action-btn {
            background: linear-gradient(135deg, #ff0040, #ff4d79);
            color: white; border: none; padding: 18px; border-radius: 15px; 
            width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .copy-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 15px; border-radius: 12px; width: 100%; 
            font-size: 15px; cursor: pointer; margin-top: 20px; display: none; transition: 0.3s;
        }
        #outputWrapper { display: none; margin-top: 30px; }
        .result-card { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .signal-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .time-range { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: #fff; display: block; }
        .purple-text { color: #a333ff; }
        .pink-text { color: #ff0040; }

        .user-info { font-size: 10px; color: #555; text-align: center; margin-top: 15px; }
        #hidden-copy-area { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div class="premium-container">
        <div class="header">
            <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
            <div class="sub-header" id="dynamicSub">Secure User Access</div>
        </div>

        <div id="loginSection">
            <div class="input-group">
                <label>Registered Email</label>
                <input type="email" id="userEmail" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="userPass" placeholder="••••••••">
            </div>
            <div id="loginError" class="error-msg"></div>
            <button class="action-btn" id="loginBtn" onclick="handleLogin()">AUTHENTICATE</button>
            <div class="user-info">Your Device ID: <span id="myDevID">Loading...</span></div>
        </div>

        <div id="mainAppSection">
            <div class="upload-zone">
                <input type="file" id="imageInput" style="display:none;" accept="image/*">
                <label for="imageInput" class="file-label" id="fileLabel">
                    <span id="labelText">Upload History Screenshot</span>
                </label>
                <button class="action-btn" id="analyzeBtn" onclick="processImage()">Generate Signals</button>
            </div>

            <div id="outputWrapper">
                <div class="result-card" id="outputContent"></div>
                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy Signals Text</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:#444; width:100%; margin-top:20px; font-size:12px; cursor:pointer;">Logout Device</button>
        </div>

        <textarea id="hidden-copy-area"></textarea>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // --- Firebase Configuration (Same as Admin) ---
        const firebaseConfig = {
          apiKey: "AIzaSyBmLvGb0vXkJhKVKew1sYZpHuVPo-mHvjk",
          authDomain: "aviatorsignal-ff90c.firebaseapp.com",
          projectId: "aviatorsignal-ff90c",
          storageBucket: "aviatorsignal-ff90c.firebasestorage.app",
          messagingSenderId: "656549146292",
          appId: "1:656549146292:web:f35944e4ae7b6db943f1e1",
          measurementId: "G-B5N5DG523J"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Generate/Get Device ID ---
        function getDeviceID() {
            let id = localStorage.getItem('alpha_dev_id');
            if(!id) {
                id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('alpha_dev_id', id);
            }
            return id;
        }
        const MY_DEVICE_ID = getDeviceID();
        document.getElementById('myDevID').innerText = MY_DEVICE_ID;

        // --- Login Handling ---
        async function handleLogin() {
            const email = document.getElementById('userEmail').value.trim();
            const pass = document.getElementById('userPass').value.trim();
            const errorBox = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            if(!email || !pass) { showError("Fill all fields"); return; }

            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            try {
                // 1. Firebase Auth Login
                const userCred = await auth.signInWithEmailAndPassword(email, pass);
                const uid = userCred.user.uid;

                // 2. Firestore Data Check
                const userDoc = await db.collection("users").doc(uid).get();
                
                if(!userDoc.exists) {
                    showError("User record not found in Database.");
                    auth.signOut();
                    return;
                }

                const userData = userDoc.data();

                // 3. Expiry Check
                if(userData.expiryDate) {
                    const expDate = new Date(userData.expiryDate);
                    if(expDate < new Date()) {
                        showError("YOUR ACCESS HAS EXPIRED! Contact Admin.");
                        auth.signOut();
                        return;
                    }
                }

                // 4. Device ID Security
                let allowedDevices = userData.allowed_devices || [];
                
                if(allowedDevices.length === 0) {
                    // First time login - Register this device automatically
                    await db.collection("users").doc(uid).update({
                        allowed_devices: [MY_DEVICE_ID]
                    });
                } else if(!allowedDevices.includes(MY_DEVICE_ID)) {
                    showError("DEVICE NOT AUTHORIZED! Access restricted to registered devices.");
                    auth.signOut();
                    return;
                }

                // SUCCESS - Show App
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainAppSection').style.display = 'block';
                document.getElementById('dynamicSub').innerText = "Advanced AI Recognition Active";

            } catch (err) {
                showError(err.message);
            } finally {
                btn.innerText = "AUTHENTICATE";
                btn.disabled = false;
            }
        }

        function showError(msg) {
            const err = document.getElementById('loginError');
            err.innerText = msg;
            err.style.display = 'block';
        }

        // --- Original Signal Processing Logic ---
        let signalTextToCopy = "";
        const imageInput = document.getElementById('imageInput');
        imageInput.addEventListener('change', function() {
            if(this.files[0]) document.getElementById('labelText').innerText = this.files[0].name;
        });

        function processImage() {
            const file = imageInput.files[0];
            if (!file) { alert("Upload screenshot!"); return; }
            document.getElementById('analyzeBtn').innerText = "Analyzing Patterns...";
            
            Tesseract.recognize(file, 'eng').then(() => {
                const now = new Date();
                const fmt = (m) => new Date(now.getTime() + m * 60000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }).toLowerCase();
                
                const r1 = `${fmt(4)} – ${fmt(6)}`;
                const r2 = `${fmt(12)} – ${fmt(15)}`;
                const r3 = `${fmt(25)} – ${fmt(28)}`;

                document.getElementById('outputContent').innerHTML = `
                    <div class="signal-row"><span class="label">Immediate</span><span class="time-range">${r1}</span><span class="purple-text">Purple Opportunity</span></div>
                    <div class="signal-row"><span class="label">Main</span><span class="time-range">${r2}</span><span class="purple-text">Stable Trend</span></div>
                    <div class="signal-row"><span class="label">High-Odd (10x+)</span><span class="time-range">${r3}</span><span class="pink-text">Pink Probability</span></div>
                `;

                signalTextToCopy = `🚀 ALPHA-SIGNAL PREDICTIONS 🚀\n\n1. Immediate: ${r1}\n2. Main: ${r2}\n3. High-Odd: ${r3}\n\nGood Luck!`;
                document.getElementById('outputWrapper').style.display = "block";
                document.getElementById('copyBtn').style.display = "block";
                document.getElementById('analyzeBtn').innerText = "Generate Signals";
            });
        }

        function copyToClipboard() {
            const copyArea = document.getElementById('hidden-copy-area');
            copyArea.value = signalTextToCopy;
            copyArea.select();
            navigator.clipboard.writeText(signalTextToCopy).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "COPIED ✅";
                setTimeout(() => btn.innerText = "Copy Signals Text", 2000);
            });
        }
    </script>
</body>
</html>
