<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA-SIGNAL | Pro AI Analyser</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff0040;
            --primary-glow: rgba(255, 0, 64, 0.5);
            --bg-dark: #060608;
            --card-bg: rgba(16, 16, 20, 0.95);
            --text-main: #ffffff;
            --text-muted: #9090a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a24 0%, #060608 70%);
            overflow-x: hidden;
        }

        .premium-container {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            width: 100%;
            max-width: 480px;
            padding: 35px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            display: none;
            position: relative;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            display: none;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .brand-logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .brand-logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }
        .sub-header { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 11px; color: var(--primary); font-weight: 600; margin-left: 10px; text-transform: uppercase; }
        .std-input {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 12px; color: white; font-size: 16px; outline: none;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #ff0040, #ff4d79);
            color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .analyze-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .file-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px dashed rgba(255, 0, 64, 0.3); border-radius: 20px; padding: 30px;
            cursor: pointer; background: rgba(255, 255, 255, 0.02); margin-bottom: 20px;
        }

        #outputWrapper { display: none; margin-top: 25px; animation: fadeIn 0.5s ease; }
        .result-card { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .signal-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); text-align: left; }
        .label { font-size: 11px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .time-range { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: #fff; }
        .purple-text { color: #a333ff; font-size: 12px; font-weight: 600; margin-left: 10px; }
        .pink-text { color: #ff0040; font-size: 12px; font-weight: 600; margin-left: 10px; }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 15px; border-radius: 12px; width: 100%; font-size: 15px; cursor: pointer; margin-top: 20px;
        }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; font-size: 11px; }
        .expiry-tag { color: #00ff88; font-weight: 700; }
        .logout-btn { background: none; border: none; color: #ff4d4d; font-size: 12px; cursor: pointer; font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loginScreen" class="auth-card">
        <div class="header">
            <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
            <div class="sub-header">Terminal Login</div>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" class="std-input" placeholder="admin@alpha.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" class="std-input" placeholder="••••••••">
        </div>
        <button class="analyze-btn" id="loginBtn">INITIALIZE SESSION</button>
        <div id="loginError" style="color: #ff4d4d; margin-top: 10px; display: none;"></div>
    </div>

    <div id="deviceLockScreen" class="auth-card">
        <div class="header">
            <div class="brand-logo">DEVICE<span>LOCK</span></div>
            <div class="sub-header">Unauthorized Access</div>
        </div>
        <p id="showDeviceId" style="font-size: 14px; font-weight: 700; margin: 20px 0; color: var(--primary);"></p>
        <button class="analyze-btn" onclick="window.open('https://wa.me/94725019800')">CONTACT ADMIN</button>
    </div>

    <div class="premium-container" id="mainApp">
        <div class="status-bar">
            <span id="userEmail" style="color: #aaa;">user@alpha.com</span>
            <span id="expiryTime" class="expiry-tag">LIFETIME</span>
        </div>

        <div class="header">
            <div class="brand-logo">ALPHA<span>SIGNAL</span></div>
            <div class="sub-header">AI Pattern Recognition</div>
        </div>

        <div class="upload-zone">
            <input type="file" id="imageInput" style="display:none;" accept="image/*">
            <label for="imageInput" class="file-label">
                <i class="fa-solid fa-cloud-arrow-up" style="font-size: 30px; color: var(--primary); margin-bottom: 10px;"></i>
                <span id="labelText">Upload History Screenshot</span>
            </label>
            <button class="analyze-btn" id="analyzeBtn" onclick="processImage()">GENERATE SIGNALS</button>
        </div>

        <div id="outputWrapper">
            <div class="result-card" id="outputContent"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">COPY SIGNALS TEXT</button>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <button class="logout-btn" onclick="auth.signOut().then(()=>location.reload())">TERMINATE SESSION <i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBmLvGb0vXkJhKVKew1sYZpHuVPo-mHvjk",
          authDomain: "aviatorsignal-ff90c.firebaseapp.com",
          projectId: "aviatorsignal-ff90c",
          storageBucket: "aviatorsignal-ff90c.firebasestorage.app",
          messagingSenderId: "656549146292",
          appId: "1:656549146292:web:f35944e4ae7b6db943f1e1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function getDeviceId() {
            let id = localStorage.getItem("alpha_dev_id");
            if (!id) {
                id = 'ALPHA-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem("alpha_dev_id", id);
            }
            return id;
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                const devId = getDeviceId();
                db.collection("users").doc(user.uid).get().then(doc => {
                    if (doc.exists && doc.data().allowed_devices?.includes(devId)) {
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('mainApp').style.display = 'block';
                        document.getElementById('userEmail').innerText = user.email;
                    } else {
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('deviceLockScreen').style.display = 'block';
                        document.getElementById('showDeviceId').innerText = devId;
                    }
                });
            } else {
                document.getElementById('loginScreen').style.display = 'block';
            }
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => {
                const div = document.getElementById('loginError');
                div.style.display = 'block';
                div.innerText = err.message;
            });
        });

        // --- NEW SIGNAL LOGIC ---
        let signalTextToCopy = "";

        async function processImage() {
            const file = document.getElementById('imageInput').files[0];
            if (!file) { alert("Please upload a screenshot!"); return; }

            const btn = document.getElementById('analyzeBtn');
            btn.innerText = "AI SCANNING DATA...";
            btn.disabled = true;

            try {
                const result = await Tesseract.recognize(file, 'eng');
                const text = result.data.text;
                
                // Extracting multipliers like 1.50x, 10.00x
                const regex = /(\d+\.\d+)x/g;
                let multipliers = [];
                let m;
                while ((m = regex.exec(text)) !== null) {
                    multipliers.push(parseFloat(m[1]));
                }

                if (multipliers.length === 0) {
                    // Fallback average if OCR fails to find clear numbers
                    multipliers = [1.5, 2.0, 1.2]; 
                }

                const avg = multipliers.slice(0, 5).reduce((a, b) => a + b, 0) / Math.min(multipliers.length, 5);
                
                const now = new Date();
                const addMins = (mins) => new Date(now.getTime() + mins * 60000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }).toLowerCase();

                // Logic: If average is low, delay next signal. If high, speed up.
                const offset = avg > 2 ? 2 : 5; 

                const r1 = `${addMins(offset)} – ${addMins(offset+2)}`;
                const r2 = `${addMins(offset+10)} – ${addMins(offset+13)}`;
                const r3 = `${addMins(offset+25)} – ${addMins(offset+28)}`;

                document.getElementById('outputContent').innerHTML = `
                    <div class="signal-row">
                        <span class="label">Next Safe Entry (Avg: ${avg.toFixed(2)}x)</span>
                        <span class="time-range">${r1}</span><span class="purple-text">2x+ Target</span>
                    </div>
                    <div class="signal-row">
                        <span class="label">Main Trend</span>
                        <span class="time-range">${r2}</span><span class="purple-text">Stable</span>
                    </div>
                    <div class="signal-row" style="border:none;">
                        <span class="label">Premium Pink Signal</span>
                        <span class="time-range">${r3}</span><span class="pink-text">10x+ Likely</span>
                    </div>
                `;

                signalTextToCopy = `🚀 ALPHA-SIGNAL 🚀\n\n1. Safe: ${r1}\n2. Main: ${r2}\n3. Pink: ${r3}\n\nAnalysed by Pro AI.`;
                document.getElementById('outputWrapper').style.display = "block";

            } catch (e) {
                alert("Error analyzing image. Try a clearer screenshot.");
            } finally {
                btn.innerText = "GENERATE SIGNALS";
                btn.disabled = false;
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(signalTextToCopy);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED ✅";
            setTimeout(() => btn.innerText = "COPY SIGNALS TEXT", 2000);
        }

        document.getElementById('imageInput').addEventListener('change', function() {
            if(this.files[0]) document.getElementById('labelText').innerText = this.files[0].name;
        });
    </script>
</body>
</html>
